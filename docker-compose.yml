services:
  postgres:
    image: postgres:15
    container_name: nairobi_alpha_db
    environment:
      POSTGRES_DB: nairobi_alpha
      POSTGRES_USER: research
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nairobi_alpha_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d nairobi_alpha"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: nairobi_alpha_postgres
