version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nairobi_alpha_db
    environment:
      POSTGRES_DB: nairobi_alpha
      POSTGRES_USER: research
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped

  jupyter:
    build: ./docker/jupyter
    container_name: nairobi_alpha_research
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./data:/home/jovyan/data
    ports:
      - "8888:8888"
      - "8050:8050"  # for Dash dashboards later
    environment:
      - DB_HOST=postgres
      - DB_NAME=nairobi_alpha
      - DB_USER=research
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: